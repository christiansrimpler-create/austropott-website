termine_leer_text: Die Termine für die neue Spielzeit sind online!  Abonnieren Sie unseren [Newsletter](/service/newsletter/), damit Sie nichts verpassen – oder schauen Sie direkt im Ticketshop vorbei.
publikum_ueberschrift: Das sagt unser Publikum
publikum:
  - Perfektes Tempo, sprachwitzig, authentisch, genial.
  - Bereits sechs Mal dabei gewesen. Immer wieder ein Genuss – 90 Minuten wunderbare Unterhaltung und viele Lachsalven.
  - Wir haben das vierte Stück von austroPott gesehen und es war wieder großartige Unterhaltung. Danke für einen außergewöhnlichen Abend.
  - Super Location und tolle Komödie. Absolut empfehlenswert.
  - Immer wieder tolle Theaterabende.
ueber_ueberschrift: Wer wir sind
ueber_lead: austroPott wurde 2012 von Richard Saringer, Harald Schwaiger und Michael Kamp ins Leben gerufen. In Kooperation mit dem Dortmunder U spielen wir dort in wechselnder Besetzung regelmäßig erfolgreiche Stücke – von der Komödie bis zum Schauspiel, immer mit Tiefgang.
ueber_text: Wir freuen uns auf Sie und wünschen Ihnen viel Vergnügen!
