ueberschrift: Termine
lead: |-
  Der VVK beginnt am 01.September. 
  Alle Vorstellungen finden im Kino im Erdgeschoss des Dortmunder U statt. Die Abendkasse öffnet eine Stunde vor Vorstellungsbeginn.
termine_hinweis: Die Termine für die neue Spielzeit werden in Kürze veröffentlicht.
leer_zusatz: Schauen Sie bald wieder vorbei oder abonnieren Sie unseren [Newsletter](/service/newsletter/) – dann erfahren Sie als Erste, wann es weitergeht. Sobald die Vorstellungen feststehen, finden Sie die Karten direkt in unserem Ticketshop.
