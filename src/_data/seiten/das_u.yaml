# Das U – unsere Spielstätte.
ueberschrift: "Das U"
lead: "Wir spielen im Kino im Erdgeschoss des Dortmunder U – dem Zentrum für Kunst und Kreativität im Herzen Dortmunds."
text: "Das Dortmunder U, das ehemalige Brauereigebäude der Union-Brauerei mit dem goldenen „U“ auf dem Dach, ist heute eines der Wahrzeichen der Stadt und beherbergt Museen, Ausstellungen, Gastronomie – und unsere Bühne."
