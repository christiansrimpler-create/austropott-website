# Konfiguration der Redaktionsoberfläche (Sveltia CMS)
backend:
  name: github
  repo: christiansrimpler-create/austropott-website
  branch: main
  automatic_deployments: true

media_folder: src/assets/img
public_folder: /assets/img

site_url: https://austropott.de

collections:
  - name: termine
    label: Termine
    icon: calendar_month
    editor:
      preview: false
    files:
      - name: termine
        label: Vorstellungstermine
        file: src/_data/termine.yaml
        fields:
          - name: termine
            label: Termine
            label_singular: Termin
            widget: list
            summary: "{{fields.datum}} – {{fields.stueck}}"
            fields:
              - name: datum
                label: Datum
                widget: datetime
                format: YYYY-MM-DD
                date_format: DD.MM.YYYY
                time_format: false
              - name: uhrzeit
                label: Uhrzeit
                widget: string
                hint: "z. B. 19:30"
              - name: stueck
                label: Stück
                widget: relation
                collection: stuecke
                value_field: titel
                search_fields: [titel]
                display_fields: [titel]

  - name: stuecke
    label: Stücke
    label_singular: Stück
    icon: theater_comedy
    folder: src/stuecke
    extension: md
    format: yaml-frontmatter
    create: true
    delete: true
    identifier_field: titel
    summary: "{{titel}}"
    slug: "{{titel}}"
    editor:
      preview: false
    sortable_fields: [reihenfolge, titel]
    fields:
      - { name: titel, label: Titel, widget: string }
      - { name: genre, label: "Gattung / Autor (erscheint über dem Titel)", widget: string, hint: "z. B. „Komödie von Matthieu Delaporte“" }
      - { name: untertitel, label: Untertitel, widget: string, required: false, hint: "z. B. Übersetzung oder Besetzung" }
      - { name: teaser, label: "Einleitungstext (auf der Stück-Seite)", widget: text }
      - { name: kurztext, label: "Kurztext (für Start- und Übersichtsseite)", widget: text }
      - { name: bild, label: Foto, widget: image }
      - { name: bild_alt, label: "Foto-Beschreibung (für Sehbehinderte und Google)", widget: string }
      - { name: foto_credit, label: "Foto-Credit", widget: string, required: false, hint: "z. B. „Foto: Ralph Brix“" }
      - { name: reihenfolge, label: "Reihenfolge (1 = zuerst)", widget: number, value_type: int, default: 1 }
      - name: pressezitate
        label: Zitate (erscheinen unter dem Titelbild)
        label_singular: Zitat
        widget: list
        required: false
        summary: "{{fields.text}}"
        fields:
          - { name: text, label: Zitat (ohne Anführungszeichen), widget: text }
          - { name: quelle, label: Quelle, widget: string, required: false, hint: "z. B. „Ruhr Nachrichten“ – leer lassen bei Zitaten aus dem Stück" }
      - name: schlusszitat
        label: Schlusszitat (dunkler Balken vor dem Ticket-Kasten)
        widget: object
        required: false
        fields:
          - { name: text, label: Zitat (ohne Anführungszeichen), widget: text, required: false }
          - { name: quelle, label: Quelle, widget: string, required: false }
      - { name: rechte, label: "Rechtehinweis (Kleingedrucktes)", widget: string, required: false }
      - { name: body, label: "Beschreibung (Haupttext)", widget: markdown }

  - name: startseite
    label: Startseite & Zitate
    icon: home
    editor:
      preview: false
    files:
      - name: einstellungen
        label: "Startseite, Kontaktdaten & Allgemeines"
        file: src/_data/einstellungen.yaml
        fields:
          - { name: hero_headline, label: "Großes Bild: Überschrift", widget: string }
          - { name: hero_text, label: "Großes Bild: Text", widget: text }
          - { name: hero_bild, label: "Großes Bild: Startbild (erstes Bild der Slideshow)", widget: image }
          - name: hero_fokus_desktop
            label: "Großes Bild: Bildausschnitt am Desktop"
            hint: "Welcher Bereich des Bildes sichtbar bleibt, wenn es beschnitten wird."
            widget: select
            default: "50% 35%"
            options: &fokus_optionen
              - { label: "Oben", value: "50% 8%" }
              - { label: "Eher oben", value: "50% 35%" }
              - { label: "Mitte", value: "50% 50%" }
              - { label: "Eher unten", value: "50% 70%" }
              - { label: "Unten", value: "50% 85%" }
              - { label: "Oben links", value: "22% 18%" }
              - { label: "Oben rechts", value: "78% 18%" }
              - { label: "Links", value: "20% 50%" }
              - { label: "Rechts", value: "80% 50%" }
          - name: hero_fokus_mobile
            label: "Großes Bild: Bildausschnitt am Handy"
            hint: "Am Handy ist das Bild schmaler – hier ein eigener Ausschnitt."
            widget: select
            default: "50% 50%"
            options: *fokus_optionen
          - { name: termine_hinweis, label: "Hinweistext, wenn keine Termine eingetragen sind", widget: text }
          - { name: footer_text, label: "Text im Seitenfuß", widget: text }
          - { name: ticket_url, label: "Link zum Ticketshop", widget: string }
          - { name: telefon, label: Telefonnummer, widget: string }
          - { name: telefon_link, label: "Telefonnummer für Anruf-Link (Format +49…)", widget: string }
          - { name: email, label: E-Mail-Adresse, widget: string }
          - { name: spielstaette, label: Spielstätte, widget: string }
          - { name: adresse_strasse, label: Straße, widget: string }
          - { name: adresse_ort, label: PLZ und Ort, widget: string }
          - { name: instagram, label: Instagram-Link, widget: string }
          - { name: facebook, label: Facebook-Link, widget: string }
          - { name: youtube, label: YouTube-Link, widget: string }
          - name: sponsoren
            label: Sponsoren-Logos (im Seitenfuß)
            label_singular: Sponsor
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: bild, label: Logo, widget: image }
              - { name: name, label: Name, widget: string }
      - name: zitate
        label: "Zitate auf der Startseite"
        file: src/_data/zitate.yaml
        fields:
          - name: presse
            label: Pressezitat (groß, unter dem Titelbild)
            widget: object
            fields:
              - { name: text, label: Zitat (ohne Anführungszeichen), widget: text }
              - { name: quelle, label: Quelle, widget: string }
          - name: publikum
            label: Publikumsstimmen
            label_singular: Publikumsstimme
            widget: list
            field: { name: zitat, label: Zitat (ohne Anführungszeichen), widget: text }

  - name: team
    label: Team
    icon: groups
    editor:
      preview: false
    files:
      - name: team
        label: Team-Seite
        file: src/_data/team.yaml
        fields:
          - { name: intro, label: Einleitungstext, widget: text }
          - name: mitglieder
            label: Team-Mitglieder
            label_singular: Mitglied
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: Name, widget: string }
              - { name: bild, label: Foto, widget: image }
              - { name: text, label: Lebenslauf, widget: text }
              - { name: website, label: "Eigene Website (optional)", widget: string, required: false }

  - name: tickets
    label: Ticketpreise
    icon: confirmation_number
    editor:
      preview: false
    files:
      - name: preise
        label: Preise & Ermäßigungen
        file: src/_data/preise.yaml
        fields:
          - name: kategorien
            label: Preiskategorien
            label_singular: Kategorie
            widget: list
            summary: "{{fields.name}} – {{fields.preis}}"
            fields:
              - { name: name, label: Kategorie, widget: string }
              - { name: plaetze, label: Plätze, widget: string }
              - { name: preis, label: Preis, widget: string }
          - { name: versand_hinweis, label: Hinweis unter der Tabelle, widget: text }
          - name: ermaessigung
            label: Ermäßigungsberechtigte
            widget: list
            field: { name: punkt, label: Eintrag, widget: string }

  - name: galerie
    label: "Galerie & Archiv"
    icon: photo_library
    editor:
      preview: false
    files:
      - name: produktionen
        label: "Produktionen & Fotos"
        file: src/_data/produktionen.yaml
        fields:
          - name: produktionen
            label: Produktionen
            label_singular: Produktion
            widget: list
            summary: "{{fields.titel}} ({{fields.jahre}})"
            fields:
              - { name: titel, label: Titel, widget: string, hint: "mit Anführungszeichen, z. B. „Die Tanzstunde“" }
              - { name: jahre, label: "Jahr(e)", widget: string, hint: "z. B. „2024“ oder „2021 · 2022“", required: false }
              - { name: besetzung, label: Besetzung, widget: string, hint: "z. B. „mit Monika Bujinski und Michael Kamp“", required: false }
              - name: bilder
                label: Fotos
                label_singular: Foto
                hint: "Produktionen mit Fotos erscheinen oben als eigener Block, ohne Fotos in der Chronik darunter."
                widget: list
                required: false
                summary: "{{fields.beschreibung}}"
                fields:
                  - { name: bild, label: Bild, widget: image }
                  - { name: beschreibung, label: Beschreibung, widget: string }
                  - name: fokus_desktop
                    label: "Bildausschnitt am Desktop (Startseiten-Slideshow)"
                    hint: "Welcher Bereich sichtbar bleibt, wenn das Bild in der Slideshow oben beschnitten wird."
                    widget: select
                    default: "50% 35%"
                    options: *fokus_optionen
                  - name: fokus_mobile
                    label: "Bildausschnitt am Handy (Startseiten-Slideshow)"
                    widget: select
                    default: "50% 35%"
                    options: *fokus_optionen

  - name: faq
    label: "Häufige Fragen"
    icon: help
    editor:
      preview: false
    files:
      - name: faq
        label: "Fragen & Antworten"
        file: src/_data/faq.yaml
        hint: "Erscheint auf der FAQ-Seite und als „Gut zu wissen“ auf der Ticketseite."
        fields:
          - name: fragen
            label: Fragen
            label_singular: Frage
            widget: list
            summary: "{{fields.frage}}"
            fields:
              - { name: frage, label: Frage, widget: string }
              - { name: antwort, label: Antwort, widget: markdown }

  - name: seitentexte
    label: "Seitentexte"
    icon: description
    editor:
      preview: false
    files:
      - name: seiten
        label: "Überschriften & Texte der Seiten"
        file: src/_data/seiten.yaml
        hint: "Hier stehen die Überschriften, Einleitungen und Textabsätze der einzelnen Seiten. Die Listen wie Stücke, Termine oder Team werden in ihren eigenen Bereichen gepflegt."
        fields:
          - name: start
            label: "Startseite"
            widget: object
            collapsed: true
            fields:
              - { name: stuecke_ueberschrift, label: "Überschrift „Die Stücke“", widget: string }
              - { name: termine_ueberschrift, label: "Überschrift „Nächste Termine“", widget: string }
              - { name: publikum_ueberschrift, label: "Überschrift „Das sagt unser Publikum“", widget: string }
              - { name: ueber_ueberschrift, label: "„Wer wir sind“: Überschrift", widget: string }
              - { name: ueber_lead, label: "„Wer wir sind“: Einleitung", widget: text }
              - { name: ueber_text, label: "„Wer wir sind“: Schlusssatz", widget: text }
          - name: die_stuecke
            label: "Seite „Die Stücke“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
          - name: termine
            label: "Seite „Termine“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
              - { name: gutzuwissen_ueberschrift, label: "„Gut zu wissen“: Überschrift", widget: string }
              - { name: gutzuwissen_text, label: "„Gut zu wissen“: Text", widget: markdown }
          - name: tickets
            label: "Seite „Tickets“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
              - { name: preise_ueberschrift, label: "Überschrift „Preise“", widget: string }
              - { name: gutzuwissen_ueberschrift, label: "Überschrift „Gut zu wissen“", widget: string }
          - name: team
            label: "Seite „Team“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string, hint: "Die Einleitung dieser Seite wird im Bereich „Team“ gepflegt." }
          - name: galerie
            label: "Seite „Galerie & Archiv“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
              - { name: weitere_ueberschrift, label: "Überschrift „Weitere Produktionen“", widget: string }
              - { name: weitere_lead, label: "„Weitere Produktionen“: Einleitung", widget: text }
          - name: faq
            label: "Seite „Häufige Fragen“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
          - name: kontakt
            label: "Seite „Kontakt“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
          - name: service
            label: "Seite „Infos“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
          - name: anfahrt
            label: "Seite „Anfahrt“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string, hint: "Adresse und Spielstätte darunter kommen aus „Startseite, Kontaktdaten & Allgemeines“." }
              - { name: bus_bahn_ueberschrift, label: "Abschnitt 1: Überschrift", widget: string }
              - { name: bus_bahn_text, label: "Abschnitt 1: Text", widget: markdown }
              - { name: bahn_ueberschrift, label: "Abschnitt 2: Überschrift", widget: string }
              - { name: bahn_text, label: "Abschnitt 2: Text", widget: markdown }
              - { name: auto_ueberschrift, label: "Abschnitt 3: Überschrift", widget: string }
              - { name: auto_text, label: "Abschnitt 3: Text (unter der Navigationsadresse)", widget: markdown }
          - name: das_u
            label: "Seite „Das U“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
              - { name: text, label: Fließtext, widget: markdown }
          - name: newsletter
            label: "Seite „Newsletter“"
            widget: object
            collapsed: true
            fields:
              - { name: ueberschrift, label: Überschrift, widget: string }
              - { name: lead, label: Einleitung, widget: text }
