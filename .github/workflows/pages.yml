name: Website bauen und auf GitHub Pages veröffentlichen

on:
  push:
    branches: [main]
  schedule:
    # Täglich neu bauen, damit vergangene Termine automatisch verschwinden
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eleventy
        env:
          # Eigene Domain austropott.de -> Auslieferung im Root
          PATH_PREFIX: /
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
